<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Twinnxtdoor Visuals</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: black;
      color: white;
    }

    header {
      text-align: center;
      padding: 60px 20px;
      background: url('your-car-photo.jpg') no-repeat center/cover;
    }

    header h1 {
      font-size: 3em;
      margin: 0;
    }

    section {
      padding: 40px;
      text-align: center;
    }

    .gallery img {
      width: 300px;
      margin: 10px;
      border-radius: 10px;
    }

    a {
      color: #00ffcc;
      text-decoration: none;
    }
  </style>
</head>

<body>

<header>
  <h1>Twinnxtdoor Visuals</h1>
  <p>Capturing Cars with Personality</p>
</header>

<section>
  <h2>Portfolio</h2>
  <div class="gallery">
    <img src="car1.jpg">
    <img src="car2.jpg">
    <img src="car3.jpg">
  </div>
</section>

<section>
  <h2>Book a Shoot</h2>
  <p>Email me: your@email.com</p>
  <p>Instagram: @twinnxtdoor</p>
</section>

</body>
